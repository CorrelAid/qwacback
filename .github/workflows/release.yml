name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  QWACBACK_IMAGE: ${{ github.repository }}
  WORKER_IMAGE: ${{ github.repository }}-schematron-worker

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for qwacback
        id: meta-qwacback
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.QWACBACK_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for schematron-worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push qwacback
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-qwacback.outputs.tags }}
          labels: ${{ steps.meta-qwacback.outputs.labels }}
          cache-from: type=gha,scope=qwacback
          cache-to: type=gha,mode=max,scope=qwacback

      - name: Build and push schematron-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./schematron-worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=schematron-worker
          cache-to: type=gha,mode=max,scope=schematron-worker
