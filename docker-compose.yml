services:
  schematron-worker:
    build:
      context: .
      dockerfile: schematron-worker/Dockerfile
    environment:
      - NATS_URL=nats://qwacback:4222
      - SCHEMATRON_PATH=/app/schematron/ddi_custom_rules.sch
      - XSD_PATH=/app/xml/codebook.xsd
    depends_on:
      - qwacback
    restart: always

  qwacback:
    build: .
    ports:
      - "8090:8080"
    environment:
      - PB_ADMIN_EMAIL=admin@example.com
      - PB_ADMIN_PASSWORD=yourpassword123
      - PB_USER_EMAIL=user@example.com
      - PB_USER_PASSWORD=userpassword123
      - GOMEMLIMIT=512MiB
      - NATS_PORT=4222
    volumes:
      - pb_data:/app/pb_data
    restart: always
    command: ["./qwacback", "serve", "--http=0.0.0.0:8080"]

volumes:
  pb_data:
